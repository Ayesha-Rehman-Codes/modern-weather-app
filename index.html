<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container" id="appBackground">
        <header>
            <h1>Weather App 🌤️</h1>
        </header>

        <main>
            <!-- Search Section -->
            <section class="search-section">
                <input type="text" id="cityInput" placeholder="Enter city name" autocomplete="off">
                <button id="searchBtn">Search</button>
                <button id="locationBtn" title="Use Current Location">📍</button>
            </section>

            <!-- Error Message Display -->
            <div id="errorMessage" class="error-message hidden"></div>

            <!-- Weather Details Display -->
            <section id="weatherCard" class="weather-card hidden">
                <h2 id="cityName">City Name</h2>
                <div class="weather-info">
                    <div id="weatherIcon" class="weather-icon">☀️</div>
                    <div id="temperature" class="temp-display">--°C</div>
                    <p id="weatherCondition">Condition</p>
                </div>
                <div class="weather-details">
                    <div class="detail-item">
                        <span>Humidity:</span>
                        <span id="humidity">--%</span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
